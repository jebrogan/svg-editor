<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Editor</title>
    <link rel="stylesheet" href="svg-editor.css">
</head>
<body>
    <div id="app">
        <header id="topbar">
            <span class="title">SVG Editor</span>
            <span class="tool-status">Tool: <b id="tool-name">select</b></span>
            <span class="precision-control">
                Precision:
                <select id="precision-select" title="Snap precision for arrows and drags. Does not affect existing values.">
                    <option value="0">int</option>
                    <option value="1" selected>0.1</option>
                    <option value="2">0.01</option>
                    <option value="3">0.001</option>
                    <option value="4">0.0001</option>
                    <option value="free">free</option>
                </select>
            </span>
            <label class="grid-control">
                <input type="checkbox" id="grid-toggle"> Grid
            </label>
            <label class="grid-control" title="Grid spacing">
                Spacing:
                <input type="range" id="grid-spacing" min="5" max="100" step="1" value="20">
                <span id="grid-spacing-val" class="num">20</span>
            </label>
            <span class="canvas-control" title="Canvas viewBox">
                <span>Canvas</span>
                <label>x<input id="canvas-x" type="number"></label>
                <label>y<input id="canvas-y" type="number"></label>
                <label>w<input id="canvas-w" type="number"></label>
                <label>h<input id="canvas-h" type="number"></label>
                <button id="canvas-aspect-lock" type="button" title="Lock aspect ratio when changing W or H" aria-pressed="false">aspect</button>
                <select id="canvas-preset" title="Apply a preset size">
                    <option value="">Preset…</option>
                    <option value="16,16">16 × 16</option>
                    <option value="32,32">32 × 32</option>
                    <option value="64,64">64 × 64</option>
                    <option value="256,256">256 × 256</option>
                    <option value="512,512">512 × 512</option>
                    <option value="800,600">800 × 600</option>
                    <option value="1024,768">1024 × 768</option>
                    <option value="1280,720">1280 × 720</option>
                    <option value="1920,1080">1920 × 1080</option>
                    <option value="595,842">A4 (595 × 842)</option>
                </select>
            </span>
            <span class="spacer"></span>
            <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>Undo</button>
            <button id="btn-redo" title="Redo (Ctrl+Shift+Z)" disabled>Redo</button>
            <button id="btn-clear" title="Remove all elements">Clear</button>
            <button id="btn-delete" title="Delete selected (Del)">Delete</button>
        </header>

        <aside id="palette">
            <div class="section-label">Tools</div>
            <button class="tool-btn" data-tool="select" title="Select / move">Select</button>
            <div class="section-label">Add</div>
            <button class="tool-btn" data-tool="rect">Rectangle</button>
            <button class="tool-btn" data-tool="ellipse">Ellipse</button>
            <button class="tool-btn" data-tool="circle">Circle</button>
            <button class="tool-btn" data-tool="line">Line</button>
            <button class="tool-btn" data-tool="text">Text</button>
            <button class="tool-btn" data-tool="polyline">Polyline</button>
            <button class="tool-btn" data-tool="polygon">Polygon</button>
            <button class="tool-btn" data-tool="path">Path</button>
            <button class="tool-btn" data-tool="image">Image</button>
            <div class="section-label">Edit</div>
            <button class="tool-btn" id="btn-duplicate" title="Duplicate selected element offset by (+10, +10)">Duplicate</button>
            <button class="tool-btn" id="btn-snap-precision" title="Round numeric values of the selected element to the current precision">Snap to precision</button>
            <div class="section-label">Arrange</div>
            <button class="tool-btn" id="btn-z-front" title="Bring to front (Ctrl+Shift+])">To front</button>
            <button class="tool-btn" id="btn-z-forward" title="Bring forward one step (Ctrl+])">Forward</button>
            <button class="tool-btn" id="btn-z-backward" title="Send backward one step (Ctrl+[)">Backward</button>
            <button class="tool-btn" id="btn-z-back" title="Send to back (Ctrl+Shift+[)">To back</button>
            <div class="section-label">Calculator</div>
            <button class="tool-btn" id="calc-toggle" title="Show / hide the calculator panel">Show calc</button>
        </aside>

        <main id="canvas-wrap">
            <div id="ruler-corner" class="ruler"></div>
            <div id="ruler-top" class="ruler"></div>
            <div id="ruler-left" class="ruler"></div>
            <svg id="canvas" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
                <g id="grid"></g>
                <g id="content"></g>
                <g id="handles"></g>
            </svg>
        </main>

        <aside id="inspector">
            <div class="section-label">Inspector</div>
            <div id="inspector-empty" class="muted">No selection</div>
            <div id="inspector-body" hidden>
                <div class="row">
                    <label>ID</label>
                    <input id="i-id" type="text" spellcheck="false" autocomplete="off" title="Identifier; must be unique and contain no whitespace">
                </div>
                <div class="row">
                    <label>Type</label>
                    <input id="i-type" type="text" readonly>
                </div>

                <button id="btn-send-to-calc" class="mini" hidden title="Send the selected element (or its selected segment / vertex pair) to the calculator panel">Send to calculator</button>

                <div class="group" id="geom-group">
                    <div class="section-label">Geometry</div>
                    <div id="geom-fields"></div>
                </div>

                <div class="group">
                    <div class="section-label">Fill</div>
                    <div class="row">
                        <label>Color</label>
                        <input id="i-fill" type="color">
                        <button class="mini" id="i-fill-none" title="No fill">none</button>
                    </div>
                    <div class="row">
                        <label>Opacity</label>
                        <input id="i-fill-opacity" type="range" min="0" max="1" step="0.05">
                        <span id="i-fill-opacity-val" class="num"></span>
                    </div>
                </div>

                <div class="group">
                    <div class="section-label">Stroke</div>
                    <div class="row">
                        <label>Color</label>
                        <input id="i-stroke" type="color">
                        <button class="mini" id="i-stroke-none" title="No stroke">none</button>
                    </div>
                    <div class="row">
                        <label>Width</label>
                        <input id="i-stroke-width" type="number" min="0" step="0.5">
                    </div>
                    <div class="row">
                        <label>Dash</label>
                        <input id="i-stroke-dash" type="text" placeholder="e.g. 4 2">
                    </div>
                </div>

                <div class="group" id="path-group" hidden>
                    <div class="section-label">Path segments</div>
                    <div id="path-segments"></div>
                    <button id="path-add-segment" class="mini">+ Add segment</button>
                </div>

                <div class="group" id="poly-group" hidden>
                    <div class="section-label">Points</div>
                    <div id="poly-points"></div>
                    <button id="poly-add-point" class="mini">+ Add point</button>
                </div>

                <div class="group" id="image-group" hidden>
                    <div class="section-label">Image</div>
                    <div class="row">
                        <label>Source</label>
                        <span id="i-image-href-display" class="muted" title=""></span>
                    </div>
                    <div class="row">
                        <label>Prefix</label>
                        <input id="i-image-prefix" type="text" placeholder="image/" title="Path written before the filename in the SVG source. Leave empty for filename-only.">
                    </div>
                    <div class="row image-buttons">
                        <button id="btn-image-file" class="mini">From file…</button>
                        <button id="btn-image-url" class="mini">From URL…</button>
                    </div>
                    <div class="row">
                        <label>Align</label>
                        <select id="i-image-align" title="preserveAspectRatio alignment">
                            <option value="none">none (stretch)</option>
                            <option value="xMinYMin">xMinYMin</option>
                            <option value="xMidYMin">xMidYMin</option>
                            <option value="xMaxYMin">xMaxYMin</option>
                            <option value="xMinYMid">xMinYMid</option>
                            <option value="xMidYMid">xMidYMid</option>
                            <option value="xMaxYMid">xMaxYMid</option>
                            <option value="xMinYMax">xMinYMax</option>
                            <option value="xMidYMax">xMidYMax</option>
                            <option value="xMaxYMax">xMaxYMax</option>
                        </select>
                    </div>
                    <div class="row">
                        <label>Mode</label>
                        <select id="i-image-mode" title="meet = fit inside (letterbox); slice = cover (crop)">
                            <option value="meet">meet</option>
                            <option value="slice">slice</option>
                        </select>
                    </div>
                </div>

                <input type="file" id="image-file-input" accept="image/*" hidden>

                <div class="group" id="text-group" hidden>
                    <div class="section-label">Text</div>
                    <div class="row">
                        <label>Content</label>
                        <input id="i-text-content" type="text">
                    </div>
                    <div class="row">
                        <label>Font size</label>
                        <input id="i-text-size" type="number" min="1" step="1">
                    </div>
                    <div class="row">
                        <label>Family</label>
                        <input id="i-text-family" type="text" placeholder="sans-serif">
                    </div>
                </div>
            </div>
        </aside>

        <section id="calc-panel">
            <div class="calc-header">
                <span class="section-label">Calculator</span>
                <label class="calc-prec">
                    Precision:
                    <select id="calc-precision" title="Number of decimal places to display (does not affect stored values)">
                        <option value="0">int</option>
                        <option value="1">0.1</option>
                        <option value="2">0.01</option>
                        <option value="3" selected>0.001</option>
                        <option value="4">0.0001</option>
                        <option value="free">free</option>
                    </select>
                </label>
                <button id="calc-add-block" class="mini" title="Add an empty calculation block">+ Add block</button>
            </div>
            <div id="calc-blocks"></div>
        </section>

        <section id="source-panel">
            <div class="source-header">
                <span class="section-label">SVG Source</span>
                <button id="btn-open-source" title="Open an SVG file">Open</button>
                <button id="btn-save-source" title="Save the current source to a file">Save</button>
                <button id="btn-apply-source" title="Parse text and replace canvas">Apply</button>
                <span id="source-status" class="muted"></span>
                <input type="file" id="file-input" accept=".svg,image/svg+xml,text/xml" hidden>
            </div>
            <textarea id="source" spellcheck="false"></textarea>
        </section>
    </div>
    <script src="svg-editor.js"></script>
</body>
</html>
